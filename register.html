<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Register - JobHub</title>

  <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

  <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">

    <h1 class="text-4xl font-bold text-center mb-8 text-gray-900">
      Create Account
    </h1>

    <input
      type="text"
      placeholder="Full Name"
      class="w-full border border-gray-300 p-4 rounded-xl mb-4"
    />

    <input
      type="email"
      placeholder="Email Address"
      class="w-full border border-gray-300 p-4 rounded-xl mb-4"
    />

    <input
      type="password"
      placeholder="Password"
      class="w-full border border-gray-300 p-4 rounded-xl mb-6"
    />

    <button
      class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-xl font-semibold transition"
    >
      Create Account
    </button>

    <p class="text-center text-gray-500 mt-6">

      Already have an account?

      <a
        href="login.html"
        class="text-blue-600 font-semibold"
      >
        Login
      </a>

    </p>

  </div>

</body>
</html>
