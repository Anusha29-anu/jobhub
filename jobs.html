<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8" />

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    />

    <title>Find Jobs - JobHub</title>

    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

    <!-- NAVBAR -->

    <nav class="bg-white shadow-sm sticky top-0 z-50">

        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">

            <h1 class="text-2xl font-bold text-blue-600">
                JobHub
            </h1>

            <div class="flex gap-6">

                <a href="index.html" class="text-gray-700 hover:text-blue-600">
                    Home
                </a>

                <a href="jobs.html" class="text-blue-600 font-semibold">
                    Find Jobs
                </a>

                <a href="login.html" class="text-gray-700 hover:text-blue-600">
                    Login
                </a>

            </div>

        </div>

    </nav>

    <!-- HERO -->

    <section class="bg-blue-600 text-white py-20 text-center">

        <h1 class="text-5xl font-bold mb-6">
            Find Your Dream Job
        </h1>

        <p class="text-xl">
            Browse thousands of jobs from top companies
        </p>

    </section>

    <!-- SEARCH -->

    <section class="max-w-6xl mx-auto px-4 -mt-10">

        <div class="bg-white p-6 rounded-2xl shadow-lg">

            <div class="grid md:grid-cols-3 gap-4">

                <input
                    type="text"
                    id="searchInput"
                    placeholder="Search jobs..."
                    class="border border-gray-300 p-4 rounded-xl"
                />

                <select
                    id="locationFilter"
                    class="border border-gray-300 p-4 rounded-xl"
                >

                    <option value="">
                        All Locations
                    </option>

                    <option>
                        Hyderabad
                    </option>

                    <option>
                        Bangalore
                    </option>

                    <option>
                        Chennai
                    </option>

                    <option>
                        Remote
                    </option>

                </select>

                <button
                    onclick="filterJobs()"
                    class="bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-semibold"
                >
                    Search Jobs
                </button>

            </div>

        </div>

    </section>

    <!-- JOBS -->

    <section class="max-w-6xl mx-auto px-4 py-16">

        <div
            id="jobsContainer"
            class="grid md:grid-cols-2 lg:grid-cols-3 gap-6"
        >

        </div>

    </section>

    <script>

        const jobs = [

            {
                title: "Frontend Developer",
                company: "Google",
                location: "Bangalore",
                salary: "₹12 LPA"
            },

            {
                title: "Backend Developer",
                company: "Microsoft",
                location: "Hyderabad",
                salary: "₹15 LPA"
            },

            {
                title: "Full Stack Developer",
                company: "Amazon",
                location: "Chennai",
                salary: "₹18 LPA"
            },

            {
                title: "UI/UX Designer",
                company: "Infosys",
                location: "Remote",
                salary: "₹8 LPA"
            },

            {
                title: "Python Developer",
                company: "TCS",
                location: "Hyderabad",
                salary: "₹10 LPA"
            },

            {
                title: "React Developer",
                company: "Wipro",
                location: "Bangalore",
                salary: "₹11 LPA"
            }

        ];

        const jobsContainer =
            document.getElementById("jobsContainer");

        function displayJobs(data) {

            jobsContainer.innerHTML = "";

            data.forEach(job => {

                jobsContainer.innerHTML += `

                    <div class="bg-white rounded-2xl shadow-lg p-6 hover:shadow-xl transition">

                        <h2 class="text-2xl font-bold text-gray-900 mb-2">
                            ${job.title}
                        </h2>

                        <p class="text-gray-600 mb-2">
                            ${job.company}
                        </p>

                        <p class="text-gray-500 mb-4">
                            ${job.location}
                        </p>

                        <div class="flex justify-between items-center">

                            <span class="text-blue-600 font-bold">
                                ${job.salary}
                            </span>

                            <button class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg">
                                Apply
                            </button>

                        </div>

                    </div>

                `;
            });
        }

        displayJobs(jobs);

        function filterJobs() {

            const search =
                document.getElementById("searchInput")
                .value
                .toLowerCase();

            const location =
                document.getElementById("locationFilter")
                .value
                .toLowerCase();

            const filteredJobs = jobs.filter(job => {

                return (

                    job.title.toLowerCase().includes(search) &&

                    (
                        location === "" ||
                        job.location.toLowerCase() === location
                    )

                );

            });

            displayJobs(filteredJobs);

        }

    </script>

</body>
</html>
