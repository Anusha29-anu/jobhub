<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8" />

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    />

    <title>JobHub - Modern Job Portal</title>

    <meta
        name="description"
        content="Find your dream job with JobHub"
    />

    <meta
        name="keywords"
        content="jobs, career, recruitment, hiring, portal"
    />

    <!-- React -->
    <script src="https://resource.trickle.so/vendor_lib/unpkg/react@18/umd/react.production.min.js"></script>

    <script src="https://resource.trickle.so/vendor_lib/unpkg/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- Babel -->
    <script src="https://resource.trickle.so/vendor_lib/unpkg/@babel/standalone/babel.min.js"></script>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Axios -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <!-- Icons -->
    <link
        href="https://resource.trickle.so/vendor_lib/unpkg/lucide-static@0.516.0/font/lucide.css"
        rel="stylesheet"
    />

    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet"
    />

    <style type="text/tailwindcss">

        @layer theme {

            :root {

                --primary-color: #2563eb;
                --primary-hover: #1d4ed8;

                --secondary-color: #f8fafc;

                --text-dark: #0f172a;

                --text-muted: #64748b;

                --border-color: #e2e8f0;
            }
        }

        @layer base {

            body {

                font-family: 'Inter', sans-serif;

                background-color: var(--secondary-color);

                color: var(--text-dark);

                -webkit-font-smoothing: antialiased;
            }
        }

        @layer components {

            .btn {

                @apply inline-flex items-center justify-center px-4 py-2 rounded-lg font-medium transition-colors duration-200 cursor-pointer;
            }

            .btn-primary {

                @apply bg-[var(--primary-color)] text-white hover:bg-[var(--primary-hover)];
            }

            .btn-outline {

                @apply border-2 border-[var(--primary-color)] text-[var(--primary-color)] hover:bg-blue-50;
            }

            .card {

                @apply bg-white rounded-xl border border-[var(--border-color)] shadow-sm hover:shadow-md transition-shadow duration-200 overflow-hidden;
            }

            .glass-panel {

                @apply bg-white/80 backdrop-blur-md border border-white/20 shadow-lg;
            }
        }

    </style>

</head>

<body>

    <!-- React Root -->
    <div id="root"></div>

    <!-- Dummy Data -->
    <script
        type="text/babel"
        src="data/dummyData.js"
    ></script>

    <!-- Components -->
    <script
        type="text/babel"
        src="components/Navbar.js"
    ></script>

    <script
        type="text/babel"
        src="components/Footer.js"
    ></script>

    <script
        type="text/babel"
        src="components/JobCard.js"
    ></script>

    <!-- Main App -->
    <script
        type="text/babel"
        src="app.js"
    ></script>

</body>

</html>
